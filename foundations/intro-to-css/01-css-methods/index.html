<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methods for Adding CSS</title>
    <link rel="stylesheet" href="external.css">
    <style>
      #internal {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        border-radius: 5px;
        color: white;
        background-color: green;
      }
    </style>
  </head>
  <body>
    <div id="external">Style me via the external method!</div>
    <p id="internal">I would like to be styled with the internal method, please.</p>
    <button style="background-color: orange; color: black; font-family: Arial, Helvetica, sans-serif; border-radius: 5px; font-size: 18px;">Inline Method</button>
  </body>
</html>
